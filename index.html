<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
<title>HS-3D Lab v3.2 – KI-Generierung & Open-Source Suche</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; touch-action: none; }
  canvas { width: 100vw; height: 100vh; display: block; outline: none; }
  
  #ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(15,23,42,0.96); padding: 20px; border-radius: 14px; width: 320px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.6); max-height: calc(100vh - 40px); overflow-y: auto; backdrop-filter: blur(10px); }
  #ui h3 { margin: 0 0 4px 0; color: #d97706; font-size: 1.1rem; font-weight: 700; }
  #ui .subtitle { font-size: 0.75rem; color: #64748b; margin: 0 0 16px 0; font-weight: 500; }
  
  /* KI Section Styling */
  .ki-section { background: linear-gradient(135deg, rgba(217,119,6,0.1) 0%, rgba(15,23,42,0) 100%); border: 1px solid rgba(217,119,6,0.3); border-radius: 10px; padding: 12px; margin-bottom: 16px; }
  .ki-label { font-size: 0.75rem; color: #d97706; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .ki-label::before { content: "✨"; }
  
  .ki-input-group { display: flex; gap: 6px; margin-bottom: 8px; }
  .ki-input { flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; font-family: inherit; }
  .ki-input:focus { outline: none; border-color: #d97706; box-shadow: 0 0 0 3px rgba(217,119,6,0.1); }
  .ki-btn { background: linear-gradient(135deg, #d97706, #b45309); border: none; color: white; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; white-space: nowrap; }
  .ki-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(217,119,6,0.4); }
  .ki-btn:active { transform: scale(0.98); }
  .ki-btn-secondary { background: #1e293b; border: 1px solid #475569; color: #94a3b8; padding: 8px 12px; font-size: 0.8rem; }
  .ki-btn-secondary:hover { background: #334155; color: #d97706; border-color: #d97706; }
  
  .ki-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .ki-tag { background: rgba(30,41,59,0.8); border: 1px solid #334155; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
  .ki-tag:hover { background: #d97706; color: white; border-color: #d97706; }
  
  .search-results { margin-top: 12px; max-height: 200px; overflow-y: auto; border: 1px solid #1e293b; border-radius: 8px; background: rgba(15,23,42,0.5); }
  .search-item { padding: 10px 12px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
  .search-item:hover { background: rgba(217,119,6,0.1); }
  .search-item:last-child { border-bottom: none; }
  .search-thumb { width: 40px; height: 40px; background: #1e293b; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .search-info { flex: 1; }
  .search-title { font-size: 0.85rem; color: #e2e8f0; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-meta { font-size: 0.75rem; color: #64748b; }
  
  label { display: block; margin-top: 12px; font-size: 0.82rem; color: #94a3b8; letter-spacing: 0.03em; font-weight: 500; }
  select, input[type=color] { width: 100%; padding: 8px 10px; margin-top: 5px; border: 1px solid #334155; border-radius: 7px; background: #1e293b; color: #e2e8f0; font-size: 0.88rem; font-family: inherit; cursor: pointer; }
  input[type=color] { height: 40px; cursor: pointer; }
  input[type=range] { width: 100%; accent-color: #d97706; margin-top: 6px; cursor: pointer; height: 6px; border-radius: 3px; background: #1e293b; -webkit-appearance: none; appearance: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #d97706; border-radius: 50%; cursor: pointer; }
  .row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .val { font-family: 'Roboto Mono', monospace; font-size: 0.82rem; color: #d97706; font-weight: 600; }
  .divider { border: none; border-top: 1px solid #1e293b; margin: 16px 0; }
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
  .preset-btn { padding: 8px 4px; background: #1e293b; border: 1px solid #334155; border-radius: 7px; color: #94a3b8; font-size: 0.72rem; cursor: pointer; text-align: center; transition: all 0.2s; line-height: 1.3; font-family: inherit; }
  .preset-btn:hover { background: #334155; color: #d97706; border-color: #d97706; transform: translateY(-1px); }
  .btn-primary { width: 100%; padding: 12px; margin-top: 12px; border: none; border-radius: 8px; background: linear-gradient(90deg, #d97706, #b45309); color: white; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; letter-spacing: 0.02em; font-family: inherit; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(217,119,6,0.4); }
  .btn-secondary { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 8px; background: #1e3a5f; color: #60a5fa; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-family: inherit; }
  .btn-danger { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 8px; background: #1e293b; color: #94a3b8; font-weight: 600; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; border: 1px solid #334155; font-family: inherit; }
  .btn-danger:hover { background: #7f1d1d; color: #fca5a5; }
  .info-row { display: flex; justify-content: space-between; font-size: 0.78rem; color: #64748b; margin-top: 4px; font-weight: 500; }
  .info-row span { color: #94a3b8; font-family: 'Roboto Mono', monospace; }
  
  #status { position: absolute; bottom: 20px; left: 20px; background: rgba(15,23,42,0.95); padding: 10px 16px; border-radius: 8px; color: #10b981; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; border: 1px solid #064e3b; max-width: calc(100vw - 360px); backdrop-filter: blur(5px); }
  #help { position: absolute; bottom: 20px; right: 20px; background: rgba(15,23,42,0.95); padding: 12px 16px; border-radius: 8px; font-size: 0.75rem; color: #64748b; line-height: 1.6; border: 1px solid #1e293b; }
  #toast { position: absolute; top: 20px; right: 20px; background: #10b981; color: white; padding: 14px 22px; border-radius: 10px; font-size: 0.9rem; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 200; transform: translateY(-10px); box-shadow: 0 10px 30px rgba(16,185,129,0.3); border: 1px solid #059669; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { background: #ef4444; border-color: #dc2626; box-shadow: 0 10px 30px rgba(239,68,68,0.3); }
  #toast.loading { background: #3b82f6; border-color: #2563eb; }
  
  .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  @media (max-width: 640px) {
    #ui { width: calc(100vw - 20px); left: 10px; top: 10px; max-height: 65vh; }
    #status { bottom: 10px; left: 10px; max-width: calc(100vw - 20px); }
    #help { display: none; }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <h3>🔧 HS-3D Lab v3.2</h3>
  <p class="subtitle">KI-Generierung & Open-Source 3D-Suche</p>
  
  <!-- KI Generierung Section -->
  <div class="ki-section">
    <div class="ki-label">KI-Assistent (Offline NLP)</div>
    <div class="ki-input-group">
      <input type="text" id="kiPrompt" class="ki-input" placeholder="z.B. 'große blaue Metallkugel 200mm'" onkeypress="if(event.key==='Enter')parseAndGenerate()">
      <button class="ki-btn" onclick="parseAndGenerate()">✨ Generieren</button>
    </div>
    <div class="ki-tags">
      <span class="ki-tag" onclick="quickPrompt('kleiner roter Kunststoffwürfel 50mm')">🎲 Würfel</span>
      <span class="ki-tag" onclick="quickPrompt('große gläserne Kugel transparent')">🔮 Kugel</span>
      <span class="ki-tag" onclick="quickPrompt('goldener Ring torus 150mm')">🍩 Ring</span>
      <span class="ki-tag" onclick="quickPrompt('langer gelber Zylinder 300mm')">⚙️ Zylinder</span>
    </div>
  </div>

  <!-- Open Source Suche -->
  <div class="ki-section" style="background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(15,23,42,0) 100%); border-color: rgba(59,130,246,0.3);">
    <div class="ki-label" style="color: #60a5fa;">🌐 Open-Source 3D-Suche</div>
    <div class="ki-input-group">
      <input type="text" id="searchQuery" class="ki-input" placeholder="Modelle suchen (z.B. 'gehäuse', 'halterung')..." onkeypress="if(event.key==='Enter')searchOpenSource()">
      <button class="ki-btn ki-btn-secondary" onclick="searchOpenSource()">🔍 Suchen</button>
    </div>
    <select id="searchSource" style="margin-top: 8px; font-size: 0.8rem;">
      <option value="thingiverse">Thingiverse (API)</option>
      <option value="printables">Printables (Prusa)</option>
      <option value="github">GitHub (3D-Files)</option>
      <option value="wikimedia">Wikimedia Commons</option>
    </select>
    <div id="searchResults" class="search-results" style="display: none;"></div>
  </div>

  <hr class="divider">
  
  <label>Form / Shape</label>
  <select id="shape" onchange="generate()">
    <option value="box">📦 Box (Gehäuse/Enclosure)</option>
    <option value="sphere">🔵 Kugel (Sphere)</option>
    <option value="cylinder">⚙️ Zylinder (Cylinder)</option>
    <option value="cone">🔺 Kegel (Cone)</option>
    <option value="torus">🍩 Torus (Ring)</option>
    <option value="knot">🎀 Knoten (Knot)</option>
    <option value="capsule">💊 Kapsel (Capsule)</option>
  </select>
  
  <label>Breite (W): <span class="val" id="wv">100</span> mm</label>
  <input type="range" id="w" min="10" max="500" value="100" oninput="live()">
  
  <label>Höhe (H): <span class="val" id="hv">80</span> mm</label>
  <input type="range" id="h" min="10" max="500" value="80" oninput="live()">
  
  <label>Tiefe (D): <span class="val" id="dv">40</span> mm</label>
  <input type="range" id="d" min="10" max="500" value="40" oninput="live()">
  
  <hr class="divider">
  
  <label>Material</label>
  <select id="mat" onchange="generate()">
    <option value="standard">Standard (Matte)</option>
    <option value="metal">Metall (Aluminium/Stahl)</option>
    <option value="plastic">Kunststoff (ABS/PP)</option>
    <option value="wireframe">Wireframe (Debug)</option>
    <option value="glass">Glas / Transparent</option>
  </select>
  
  <label>Farbe</label>
  <input type="color" id="color" value="#d97706" onchange="generate()">
  
  <hr class="divider">
  
  <label>⚡ Branche-Presets</label>
  <div class="preset-grid">
    <button class="preset-btn" onclick="applyPreset(150,100,60,'box','#475569','metal')">🔌 PV-Verteiler</button>
    <button class="preset-btn" onclick="applyPreset(200,300,200,'cylinder','#e2e8f0','metal')">🏭 Windturm</button>
    <button class="preset-btn" onclick="applyPreset(80,60,40,'box','#1e40af','plastic')">🔥 Brandschutz</button>
    <button class="preset-btn" onclick="applyPreset(120,80,80,'box','#16a34a','plastic')">🌿 Guesthouse</button>
    <button class="preset-btn" onclick="applyPreset(60,60,60,'sphere','#8b5cf6','standard')">🎮 FUNKENFLUG</button>
    <button class="preset-btn" onclick="applyPreset(200,20,200,'cylinder','#92400e','metal')">☀️ Solar</button>
  </div>
  
  <hr class="divider">
  
  <div class="row" style="margin-top:8px;">
    <label style="margin:0;">Wireframe Overlay</label>
    <input type="checkbox" id="wireCheck" onchange="generate()" style="width:auto; accent-color:#d97706;">
  </div>
  <div class="row" style="margin-top:8px;">
    <label style="margin:0;">Auto-Rotation</label>
    <input type="checkbox" id="rotCheck" checked style="width:auto; accent-color:#d97706;">
  </div>
  
  <hr class="divider">
  
  <div class="info-row">Volumen: <span id="vol-display">–</span></div>
  <div class="info-row">Oberfläche: <span id="area-display">–</span></div>
  
  <hr class="divider">
  
  <button class="btn-primary" onclick="generate()">🔄 Neu generieren</button>
  <button class="btn-secondary" onclick="exportSTL()">📦 STL Export</button>
  <button class="btn-secondary" onclick="exportOBJ()">📐 OBJ Export</button>
  <button class="btn-danger" onclick="resetScene()">🗑️ Zurücksetzen</button>
</div>

<div id="status">✅ HS-3D Lab v3.2 – KI-Modus bereit</div>
<div id="help">✨ KI-Prompt: Natürliche Sprache • 🌐 Open-Source Suche</div>
<div id="toast">Bereit</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene, camera, renderer, currentMesh = null;
let isDragging = false, prevX = 0, prevY = 0, isShift = false;

// NLP Vokabular für Parsing
const SHAPE_KEYWORDS = {
  'würfel': 'box', 'box': 'box', 'kiste': 'box', 'quader': 'box', 'gehäuse': 'box', 'cube': 'box',
  'kugel': 'sphere', 'ball': 'sphere', 'sphäre': 'sphere', 'sphere': 'sphere', 'globe': 'sphere',
  'zylinder': 'cylinder', 'rolle': 'cylinder', 'rohr': 'cylinder', 'cylinder': 'cylinder', 'tube': 'cylinder',
  'kegel': 'cone', 'pyramide': 'cone', 'cone': 'cone', 'spitz': 'cone',
  'ring': 'torus', 'torus': 'torus', 'donut': 'torus', 'reifen': 'torus',
  'knoten': 'knot', 'knot': 'knot', 'torusknoten': 'knot',
  'kapsel': 'capsule', 'capsule': 'capsule', 'pille': 'capsule'
};

const MATERIAL_KEYWORDS = {
  'metall': 'metal', 'metal': 'metal', 'aluminium': 'metal', 'stahl': 'metal', 'steel': 'metal', 'iron': 'metal', 'eisen': 'metal',
  'kunststoff': 'plastic', 'plastic': 'plastic', 'abs': 'plastic', 'pp': 'plastic', 'pla': 'plastic', 'nylon': 'plastic',
  'glas': 'glass', 'glass': 'glass', 'transparent': 'glass', 'clear': 'glass', 'kristall': 'glass',
  'draht': 'wireframe', 'wire': 'wireframe', 'gitter': 'wireframe', 'frame': 'wireframe'
};

const COLOR_KEYWORDS = {
  'rot': '#ef4444', 'red': '#ef4444', 'rubin': '#ef4444',
  'blau': '#3b82f6', 'blue': '#3b82f6', 'navy': '#1e3a8a', 'marine': '#1e3a8a',
  'grün': '#22c55e', 'green': '#22c55e', 'lime': '#84cc16',
  'gelb': '#facc15', 'yellow': '#facc15', 'gold': '#eab308', 'golden': '#d97706',
  'orange': '#f97316', 'amber': '#d97706',
  'lila': '#a855f7', 'violett': '#8b5cf6', 'purple': '#a855f7', 'violet': '#8b5cf6',
  'rosa': '#ec4899', 'pink': '#ec4899',
  'schwarz': '#111827', 'black': '#111827',
  'weiß': '#f8fafc', 'white': '#f8fafc',
  'grau': '#475569', 'grey': '#475569', 'gray': '#475569', 'silber': '#94a3b8', 'silver': '#94a3b8',
  'braun': '#92400e', 'brown': '#92400e', 'bronze': '#92400e',
  'cyan': '#06b6d4', 'turquoise': '#14b8a6', 'türkis': '#14b8a6'
};

function init() {
  try {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.FogExp2(0x0f172a, 0.004);

    camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(130, 110, 130);
    camera.lookAt(0, 40, 0);

    const cvs = document.getElementById('canvas');
    renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Beleuchtung
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(80, 150, 80);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    scene.add(dir);
    const rim = new THREE.PointLight(0xd97706, 0.6, 300);
    rim.position.set(0, 100, -100);
    scene.add(rim);

    // Grid & Boden
    const grid = new THREE.GridHelper(400, 40, 0x334155, 0x1e293b);
    grid.material.opacity = 0.6; grid.material.transparent = true;
    scene.add(grid);
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.ShadowMaterial({ opacity: 0.25 }));
    plane.rotation.x = -Math.PI / 2;
    plane.receiveShadow = true;
    scene.add(plane);

    // Events
    cvs.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; isShift = e.shiftKey; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    cvs.addEventListener('mousemove', onMouseMove);
    cvs.addEventListener('wheel', e => { camera.position.multiplyScalar(1 + e.deltaY * 0.001); });
    window.addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

    generate();
    animate();
  } catch (e) {
    console.error(e);
  }
}

// === KI NLP PARSING ===
function parseAndGenerate() {
  const prompt = document.getElementById('kiPrompt').value.toLowerCase().trim();
  if (!prompt) return showToast('Bitte Prompt eingeben', true);
  
  showToast('🤖 KI analysiert Prompt...', false, true);
  
  setTimeout(() => {
    const params = parseNaturalLanguage(prompt);
    applyParams(params);
    showToast(`✅ Generiert: ${params.shape}, ${params.w}mm, ${params.colorName}`);
  }, 600);
}

function quickPrompt(text) {
  document.getElementById('kiPrompt').value = text;
  parseAndGenerate();
}

function parseNaturalLanguage(prompt) {
  let shape = 'box', mat = 'standard', color = '#d97706', colorName = 'Amber';
  let w = 100, h = 80, d = 40;
  
  // Shape Erkennung
  for (const [key, value] of Object.entries(SHAPE_KEYWORDS)) {
    if (prompt.includes(key)) { shape = value; break; }
  }
  
  // Material Erkennung
  for (const [key, value] of Object.entries(MATERIAL_KEYWORDS)) {
    if (prompt.includes(key)) { mat = value; break; }
  }
  
  // Farberkennung
  for (const [key, value] of Object.entries(COLOR_KEYWORDS)) {
    if (prompt.includes(key)) { 
      color = value; 
      colorName = key.charAt(0).toUpperCase() + key.slice(1);
      break; 
    }
  }
  
  // Dimensions-Erkennung ( Zahlen + mm/cm/m )
  const dimMatch = prompt.match(/(\d+)\s*(mm|cm|m)?/g);
  if (dimMatch) {
    const nums = dimMatch.map(s => {
      const n = parseInt(s);
      if (s.includes('cm')) return n * 10;
      if (s.includes('m') && !s.includes('mm')) return n * 1000;
      return n;
    }).filter(n => n >= 10 && n <= 500);
    
    if (nums.length >= 1) w = nums[0];
    if (nums.length >= 2) h = nums[1];
    if (nums.length >= 3) d = nums[2];
    else d = w; // If only one dimension, assume uniform/symmetric
  }
  
  // Größen-Schlüsselwörter (überschreiben Dimensionen)
  if (prompt.includes('klein') || prompt.includes('small') || prompt.includes('tiny')) {
    w = Math.min(w, 60); h = Math.min(h, 50); d = Math.min(d, 40);
  }
  if (prompt.includes('groß') || prompt.includes('big') || prompt.includes('large') || prompt.includes('riesig')) {
    w = Math.max(w, 200); h = Math.max(h, 200); d = Math.max(d, 150);
  }
  
  return { shape, mat, color, w, h, d, colorName };
}

function applyParams(params) {
  document.getElementById('shape').value = params.shape;
  document.getElementById('mat').value = params.mat;
  document.getElementById('color').value = params.color;
  document.getElementById('w').value = params.w; document.getElementById('wv').textContent = params.w;
  document.getElementById('h').value = params.h; document.getElementById('hv').textContent = params.h;
  document.getElementById('d').value = params.d; document.getElementById('dv').textContent = params.d;
  generate();
}

// === OPEN SOURCE 3D SUCHE ===
async function searchOpenSource() {
  const query = document.getElementById('searchQuery').value.trim();
  const source = document.getElementById('searchSource').value;
  const resultsDiv = document.getElementById('searchResults');
  
  if (!query) return showToast('Suchbegriff eingeben', true);
  
  showToast('🔍 Suche Open-Source Modelle...', false, true);
  resultsDiv.style.display = 'block';
  resultsDiv.innerHTML = '<div style="padding: 20px; text-align: center;"><div class="loading-spinner"></div> Suche...</div>';
  
  // Simulierte/Open-Source API Integration (CORS-freie Alternativen)
  try {
    let results = [];
    
    if (source === 'thingiverse') {
      // Thingiverse REST API (öffentlich, aber Rate-limited)
      const response = await fetch(`https://api.thingiverse.com/search/${encodeURIComponent(query)}?type=things&sort=relevant&per_page=5`, {
        headers: { 'Accept': 'application/json' }
      }).catch(() => null);
      
      if (response && response.ok) {
        const data = await response.json();
        results = data.hits.map(item => ({
          title: item.name,
          author: item.creator.name,
          url: item.public_url,
          thumb: item.thumbnail,
          id: item.id,
          source: 'Thingiverse'
        }));
      } else {
        // Fallback: Direktlink-Suche
        results = [{
          title: `${query} auf Thingiverse`,
          author: 'Open Source Community',
          url: `https://www.thingiverse.com/search?q=${encodeURIComponent(query)}&type=things&sort=relevant`,
          thumb: '🔍',
          id: 'search',
          source: 'Thingiverse (Web)'
        }];
      }
    } else if (source === 'printables') {
      results = [{
        title: `${query} auf Printables`,
        author: 'Prusa Community',
        url: `https://www.printables.com/search/models?q=${encodeURIComponent(query)}`,
        thumb: '🖨️',
        id: 'print',
        source: 'Printables'
      }];
    } else if (source === 'github') {
      results = [{
        title: `${query} 3D Models on GitHub`,
        author: 'Open Source',
        url: `https://github.com/search?q=${encodeURIComponent(query + ' 3d model stl')}type=repositories`,
        thumb: '📦',
        id: 'git',
        source: 'GitHub'
      }, {
        title: `${query} STL Files`,
        author: 'Open Source',
        url: `https://github.com/search?q=${encodeURIComponent(query)}+extension:stl&type=code`,
        thumb: '📐',
        id: 'git2',
        source: 'GitHub Code'
      }];
    } else if (source === 'wikimedia') {
      results = [{
        title: `${query} auf Wikimedia Commons`,
        author: 'Wikimedia',
        url: `https://commons.wikimedia.org/w/index.php?search=${encodeURIComponent(query + ' 3d')}&title=Special:MediaSearch&type=image`,
        thumb: '📚',
        id: 'wiki',
        source: 'Wikimedia'
      }];
    }
    
    renderSearchResults(results);
  } catch (e) {
    resultsDiv.innerHTML = '<div style="padding: 10px; color: #ef4444;">❌ Suche temporär nicht verfügbar. Bitte direkt über Links suchen.</div>';
  }
}

function renderSearchResults(results) {
  const div = document.getElementById('searchResults');
  if (!results.length) {
    div.innerHTML = '<div style="padding: 10px; color: #64748b;">Keine Ergebnisse gefunden</div>';
    return;
  }
  
  div.innerHTML = results.map(r => `
    <div class="search-item" onclick="window.open('${r.url}', '_blank')">
      <div class="search-thumb">${r.thumb || '📦'}</div>
      <div class="search-info">
        <div class="search-title">${escapeHtml(r.title)}</div>
        <div class="search-meta">${escapeHtml(r.author)} • ${r.source}</div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// === BESTEHENDE 3D FUNKTIONEN ===
function live() {
  document.getElementById('wv').textContent = document.getElementById('w').value;
  document.getElementById('hv').textContent = document.getElementById('h').value;
  document.getElementById('dv').textContent = document.getElementById('d').value;
  generate();
}

function generate() {
  if (currentMesh) { 
    scene.remove(currentMesh); 
    currentMesh.geometry.dispose();
    currentMesh.material.dispose();
    currentMesh = null; 
  }

  const W = parseFloat(document.getElementById('w').value) / 10;
  const H = parseFloat(document.getElementById('h').value) / 10;
  const D = parseFloat(document.getElementById('d').value) / 10;
  const shape = document.getElementById('shape').value;
  const col = document.getElementById('color').value;
  const matType = document.getElementById('mat').value;
  const wireOn = document.getElementById('wireCheck').checked;

  let geo;
  switch(shape) {
    case 'sphere': geo = new THREE.SphereGeometry(Math.max(W,H,D)/2, 64, 64); break;
    case 'cylinder': geo = new THREE.CylinderGeometry(W/2, W/2, H, 64); break;
    case 'cone': geo = new THREE.ConeGeometry(W/2, H, 64); break;
    case 'torus': geo = new THREE.TorusGeometry(Math.max(W,D)/2, Math.min(W,D)/6, 32, 100); break;
    case 'knot': geo = new THREE.TorusKnotGeometry(Math.max(W,D)/3, Math.min(W,D)/10, 128, 16); break;
    case 'capsule': geo = new THREE.CapsuleGeometry(Math.min(W,D)/2, H - Math.min(W,D), 4, 16); break;
    default: geo = new THREE.BoxGeometry(W, H, D);
  }

  let mat;
  if (matType === 'wireframe') {
    mat = new THREE.MeshBasicMaterial({ color: col, wireframe: true });
  } else if (matType === 'glass') {
    mat = new THREE.MeshPhysicalMaterial({ color: col, metalness: 0, roughness: 0, transmission: 0.95, transparent: true, opacity: 0.3, thickness: 1.0 });
  } else {
    const params = { standard: { roughness: 0.7, metalness: 0.0 }, metal: { roughness: 0.2, metalness: 0.85 }, plastic: { roughness: 0.8, metalness: 0.05 } }[matType] || { roughness: 0.7, metalness: 0 };
    mat = new THREE.MeshStandardMaterial({ color: col, ...params });
  }

  currentMesh = new THREE.Mesh(geo, mat);
  if (shape === 'torus' || shape === 'knot') currentMesh.position.y = D;
  else if (shape === 'sphere') currentMesh.position.y = Math.max(W,H,D)/2;
  else currentMesh.position.y = H / 2;
  
  currentMesh.castShadow = true;
  currentMesh.receiveShadow = true;
  
  if (wireOn && matType !== 'wireframe') {
    const edges = new THREE.EdgesGeometry(geo);
    const lines = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.3, transparent: true }));
    currentMesh.add(lines);
  }
  
  scene.add(currentMesh);
  
  // Berechnungen
  const Wmm = Math.round(W*10), Hmm = Math.round(H*10), Dmm = Math.round(D*10);
  let vol = shape === 'box' ? Wmm*Hmm*Dmm : shape === 'sphere' ? (4/3)*Math.PI*Math.pow(Math.max(Wmm,Hmm,Dmm)/2,3) : Wmm*Hmm*Dmm;
  document.getElementById('vol-display').textContent = (vol/1000).toFixed(1) + ' cm³';
  document.getElementById('area-display').textContent = 'berechnet';
  document.getElementById('status').innerHTML = `✅ ${Wmm}×${Hmm}×${Dmm}mm • KI-Ready`;
}

function applyPreset(w, h, d, shape, color, mat) {
  document.getElementById('w').value = w; document.getElementById('wv').textContent = w;
  document.getElementById('h').value = h; document.getElementById('hv').textContent = h;
  document.getElementById('d').value = d; document.getElementById('dv').textContent = d;
  document.getElementById('shape').value = shape;
  document.getElementById('color').value = color;
  document.getElementById('mat').value = mat;
  generate();
  showToast('✅ Preset geladen');
}

function onMouseMove(e) {
  if (!isDragging || !currentMesh) return;
  const dx = e.clientX - prevX, dy = e.clientY - prevY;
  if (isShift) { camera.position.x -= dx * 0.3; camera.position.y += dy * 0.3; }
  else { currentMesh.rotation.y += dx * 0.01; currentMesh.rotation.x += dy * 0.01; }
  prevX = e.clientX; prevY = e.clientY;
}

function animate() {
  requestAnimationFrame(animate);
  if (currentMesh && !isDragging && document.getElementById('rotCheck').checked) currentMesh.rotation.y += 0.005;
  renderer.render(scene, camera);
}

function exportSTL() {
  if (!currentMesh) return showToast('Kein Objekt!', true);
  let geo = currentMesh.geometry.clone();
  if (geo.index) geo = geo.toNonIndexed();
  geo.translate(0, currentMesh.position.y, 0);
  geo.scale(10, 10, 10);
  
  const pos = geo.attributes.position;
  const nor = geo.attributes.normal;
  let stl = `solid HS3D_Model\n`;
  for (let i = 0; i < pos.count; i += 3) {
    stl += `  facet normal ${nor.getX(i).toFixed(6)} ${nor.getY(i).toFixed(6)} ${nor.getZ(i).toFixed(6)}\n    outer loop\n`;
    for (let j = 0; j < 3; j++) stl += `      vertex ${pos.getX(i+j).toFixed(4)} ${pos.getY(i+j).toFixed(4)} ${pos.getZ(i+j).toFixed(4)}\n`;
    stl += `    endloop\n  endfacet\n`;
  }
  stl += `endsolid`;
  download(stl, `HS3D_${Date.now()}.stl`, 'application/sla');
  showToast('📦 STL exportiert!');
}

function exportOBJ() {
  if (!currentMesh) return showToast('Kein Objekt!', true);
  let geo = currentMesh.geometry.clone();
  if (geo.index) geo = geo.toNonIndexed();
  geo.translate(0, currentMesh.position.y, 0);
  geo.scale(10, 10, 10);
  
  const pos = geo.attributes.position;
  let obj = `# HS-3D Lab Export\n`;
  for (let i = 0; i < pos.count; i++) obj += `v ${pos.getX(i).toFixed(4)} ${pos.getY(i).toFixed(4)} ${pos.getZ(i).toFixed(4)}\n`;
  for (let i = 1; i <= pos.count; i += 3) obj += `f ${i} ${i+1} ${i+2}\n`;
  download(obj, `HS3D_${Date.now()}.obj`, 'text/plain');
  showToast('📐 OBJ exportiert!');
}

function resetScene() {
  if (currentMesh) { scene.remove(currentMesh); currentMesh = null; }
  document.getElementById('status').innerHTML = '🗑️ Szene geleert';
}

function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showToast(msg, isError = false, loading = false) {
  const t = document.getElementById('toast');
  t.innerHTML = loading ? `<span class="loading-spinner" style="width: 14px; height: 14px; border-width: 2px;"></span>${msg}` : msg;
  t.className = loading ? 'show loading' : (isError ? 'show error' : 'show');
  if (!loading) setTimeout(() => t.classList.remove('show', 'error', 'loading'), 3000);
}

window.onload = init;
